<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Drum Tuner Pro V3 - Barreta</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e; --surface: #161616; --border: #2a2a2a;
    --accent: #e8c84a; --text: #f0ede8; --muted: #666;
    --green: #4ae8a0; --blue: #4ab8e8; --red: #e84a5f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; padding: 15px; }
  header { padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 15px; text-align: center; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--accent); }
  .subtitle { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 2px; }

  .config-panel { background: var(--surface); border: 1px solid var(--border); padding: 12px; border-radius: 10px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
  .config-row { display: flex; gap: 8px; align-items: center; }
  .config-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; }
  select { flex: 1; background: #222; color: var(--text); border: 1px solid var(--border); padding: 10px; border-radius: 5px; font-size: 0.9rem; font-family: 'DM Mono', monospace; }

  .intervals-display { background: #111; border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .int-chip { font-size: 0.65rem; color: var(--accent); font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; }
  .int-arrow { font-size: 0.55rem; color: var(--muted); }

  .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
  .btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 12px 5px; border-radius: 8px; font-size: 0.65rem; text-transform: uppercase; cursor: pointer; font-family: 'DM Mono', monospace; }
  .btn.active { background: var(--accent); color: #000; font-weight: bold; border-color: var(--accent); }
  .btn-note { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; display: block; }

  .mic-btn { width: 100%; padding: 15px; font-size: 0.9rem; font-weight: bold; background: transparent; color: var(--accent); border: 2px solid var(--accent); border-radius: 50px; margin-bottom: 15px; cursor: pointer; font-family: 'DM Mono', monospace; }
  .mic-btn.on { background: var(--red); color: white; border-color: var(--red); }

  .tuner-card { background: var(--surface); border: 1px solid var(--border); padding: 20px 10px; border-radius: 15px; text-align: center; }
  .note-display { font-family: 'Bebas Neue', sans-serif; font-size: 5rem; line-height: 1; margin: 5px 0; transition: color 0.2s; }
  .meter-container { height: 6px; background: #222; border-radius: 3px; position: relative; margin: 25px 10px; }
  .needle { position: absolute; width: 4px; height: 25px; background: var(--accent); top: -10px; left: 50%; transform: translateX(-50%); transition: left 0.1s ease-out; border-radius: 2px; }
  .center-mark { position: absolute; left: 50%; height: 100%; width: 2px; background: var(--muted); }
  .meter-labels { display: flex; justify-content: space-between; font-size: 0.5rem; color: var(--muted); margin-top: 6px; padding: 0 10px; }
  #statusOut { font-size: 0.8rem; font-weight: bold; letter-spacing: 1px; min-height: 1.2em; }
</style>
</head>
<body>

<header>
  <h1>Drum Tuner V3</h1>
  <div class="subtitle">Afinación por quintas justas</div>
</header>

<div class="config-panel">
  <div class="config-row">
    <span class="config-label">Raíz</span>
    <select id="rootSelect" onchange="buildKit()">
      <option value="C">Do</option>
      <option value="C#">Do#</option>
      <option value="D" selected>Re</option>
      <option value="D#">Re#</option>
      <option value="E">Mi</option>
      <option value="F">Fa</option>
      <option value="F#">Fa#</option>
      <option value="G">Sol</option>
      <option value="G#">Sol#</option>
      <option value="A">La</option>
      <option value="A#">La#</option>
      <option value="B">Si</option>
    </select>
  </div>
  <div class="config-row">
    <span class="config-label">Estilo</span>
    <select id="styleSelect" onchange="buildKit()">
      <option value="standard">Standard (Bombo grave)</option>
      <option value="rock">Rock/Stoner (Más grave)</option>
      <option value="jazz">Jazz/Pop (Más agudo)</option>
    </select>
  </div>
  <div class="intervals-display" id="intervalsDisplay"></div>
</div>

<div class="preset-grid" id="presetGrid"></div>

<button class="mic-btn" id="micBtn">▶ ACTIVAR MICRÓFONO</button>

<div class="tuner-card">
  <div id="targetLabel" style="font-size: 0.7rem; color: var(--accent); margin-bottom: 5px;">—</div>
  <div class="note-display" id="noteOut">—</div>
  <div id="freqOut" style="color: var(--muted); font-size: 0.9rem; margin-bottom: 10px;">0.0 Hz</div>
  <div class="meter-container">
    <div class="center-mark"></div>
    <div class="needle" id="needle"></div>
  </div>
  <div class="meter-labels"><span>−50¢</span><span>0¢</span><span>+50¢</span></div>
  <div id="statusOut" style="margin-top: 10px;">SILENCIO</div>
</div>

<script>
// ── NOTAS ────────────────────────────────────────────────────────────────────
const NOTES  = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_ES = { C:'Do',  'C#':'Do#', D:'Re', 'D#':'Re#', E:'Mi',
                  F:'Fa',  'F#':'Fa#', G:'Sol','G#':'Sol#', A:'La', 'A#':'La#', B:'Si' };

// Octavas base por cuerpo según estilo
const BASE_OCTAVES = {
  standard: { BOMBO:1, REDO:3, 'TOM 1':2, 'TOM 2':2, 'TOM 3':2, CHANCHA:3 },
  rock:     { BOMBO:1, REDO:3, 'TOM 1':2, 'TOM 2':2, 'TOM 3':1, CHANCHA:2 },
  jazz:     { BOMBO:2, REDO:3, 'TOM 1':2, 'TOM 2':2, 'TOM 3':2, CHANCHA:3 },
};

const FIFTH_OFFSETS = {
  BOMBO:   0,
  REDO:    14,
  'TOM 1': 7,
  'TOM 2': 0,
  'TOM 3': 7,
  CHANCHA: 21,
};

const DRUMS = ['BOMBO', 'REDO', 'TOM 1', 'TOM 2', 'TOM 3', 'CHANCHA'];

function noteToFreq(note, octave) {
  const idx = NOTES.indexOf(note);
  const semitones = (octave - 4) * 12 + idx - 9;
  return 440 * Math.pow(2, semitones / 12);
}

function fifthsChain(root, count) {
  const chain = [root];
  for (let i = 1; i < count; i++) {
    const idx = NOTES.indexOf(chain[i-1]);
    chain.push(NOTES[(idx + 7) % 12]);
  }
  return chain;
}

// ── KIT ──────────────────────────────────────────────────────────────────────
let kit = {};       // { BOMBO: { note, octave, freq }, ... }
let currentDrum = 'BOMBO';

function buildKit() {
  const root  = document.getElementById('rootSelect').value;
  const style = document.getElementById('styleSelect').value;
  const octaves = BASE_OCTAVES[style];

  DRUMS.forEach(name => {
    const noteIdx = (NOTES.indexOf(root) + FIFTH_OFFSETS[name]) % 12;
    const note    = NOTES[noteIdx];
    const octave  = octaves[name];
    const freq    = noteToFreq(note, octave);
    kit[name]     = { note, octave, freq };
  });

  renderPresetGrid();
  renderIntervals();
  setTarget(currentDrum);
}

function renderPresetGrid() {
  const grid = document.getElementById('presetGrid');
  grid.innerHTML = DRUMS.map(name => {
    const d = kit[name];
    return `<button class="btn ${name === currentDrum ? 'active' : ''}" onclick="setTarget('${name}')">
      <span class="btn-note">${NOTE_ES[d.note]}${d.octave}</span>
      ${name}
    </button>`;
  }).join('');
}

function renderIntervals() {
  const root  = document.getElementById('rootSelect').value;
  const chain = fifthsChain(root, 4);
  const el    = document.getElementById('intervalsDisplay');
  el.innerHTML = chain.map((n, i) =>
    `<span class="int-chip">${NOTE_ES[n]}</span>${i < chain.length-1 ? '<span class="int-arrow">→5ª→</span>' : ''}`
  ).join('');
}

function setTarget(name) {
  currentDrum = name;
  const d = kit[name];
  targetFreq = d.freq;
  document.getElementById('targetLabel').innerText =
    `OBJETIVO: ${name}  ·  ${NOTE_ES[d.note]}${d.octave}  ·  ${d.freq.toFixed(1)} Hz`;
  renderPresetGrid();
}

// ── AUDIO ────────────────────────────────────────────────────────────────────
let audioCtx, analyser, biquadFilter;
let targetFreq = 73.42;
let isListening = false;

document.getElementById('micBtn').addEventListener('click', async () => {
  if (isListening) { location.reload(); return; }
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
    });
    const source = audioCtx.createMediaStreamSource(stream);

    biquadFilter = audioCtx.createBiquadFilter();
    biquadFilter.type = 'lowpass';
    biquadFilter.frequency.setValueAtTime(500, audioCtx.currentTime);

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 4096;

    source.connect(biquadFilter);
    biquadFilter.connect(analyser);

    isListening = true;
    document.getElementById('micBtn').innerText = '■ DETENER';
    document.getElementById('micBtn').classList.add('on');
    update();
  } catch(err) { alert('Error micrófono: ' + err); }
});

function update() {
  const buffer = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buffer);
  const rms = Math.sqrt(buffer.reduce((a, v) => a + v*v, 0) / buffer.length);
  if (rms > 0.01) {
    const freq = getPitch(buffer, audioCtx.sampleRate);
    if (freq > 30 && freq < 600) processFreq(freq);
  }
  requestAnimationFrame(update);
}

function processFreq(freq) {
  const cents = 1200 * Math.log2(freq / targetFreq);
  document.getElementById('freqOut').innerText  = freq.toFixed(1) + ' Hz';
  document.getElementById('noteOut').innerText  = getNoteName(freq);

  const pos = Math.max(0, Math.min(100, 50 + cents / 2));
  document.getElementById('needle').style.left = pos + '%';

  const status   = document.getElementById('statusOut');
  const noteDisp = document.getElementById('noteOut');
  if (Math.abs(cents) < 6) {
    status.innerText   = '✓ AFINADO'; status.style.color = 'var(--green)';
    noteDisp.style.color = 'var(--green)';
  } else if (cents > 0) {
    status.innerText   = '▲ AFLOJAR PARCHE'; status.style.color = 'var(--red)';
    noteDisp.style.color = 'var(--text)';
  } else {
    status.innerText   = '▼ AJUSTAR PARCHE'; status.style.color = 'var(--blue)';
    noteDisp.style.color = 'var(--text)';
  }
}

function getNoteName(f) {
  const s = 12 * Math.log2(f / 440);
  const n = NOTES[(Math.round(s) % 12 + 12 + 9) % 12];
  const o = Math.floor((Math.round(s) + 69) / 12) - 1;
  const esMap = { C:'Do','C#':'Do#',D:'Re','D#':'Re#',E:'Mi',F:'Fa','F#':'Fa#',G:'Sol','G#':'Sol#',A:'La','A#':'La#',B:'Si' };
  return (esMap[n] || n) + o;
}

function getPitch(buf, sr) {
  let SIZE = buf.length;
  const rms = Math.sqrt(buf.reduce((a,v) => a+v*v, 0) / SIZE);
  if (rms < 0.01) return -1;

  let r1 = 0, r2 = SIZE - 1;
  for (let i = 0; i < SIZE/2; i++) if (Math.abs(buf[i])   < 0.2) { r1 = i; break; }
  for (let i = 1; i < SIZE/2; i++) if (Math.abs(buf[SIZE-i]) < 0.2) { r2 = SIZE-i; break; }

  buf = buf.slice(r1, r2);
  SIZE = buf.length;

  const c = new Float32Array(SIZE);
  for (let i = 0; i < SIZE; i++)
    for (let j = 0; j < SIZE-i; j++)
      c[i] += buf[j] * buf[j+i];

  let d = 0; while (c[d] > c[d+1]) d++;
  let maxVal = -1, maxPos = -1;
  for (let i = d; i < SIZE; i++) if (c[i] > maxVal) { maxVal = c[i]; maxPos = i; }

  return maxPos > 0 ? sr / maxPos : -1;
}

// ── INIT ─────────────────────────────────────────────────────────────────────
buildKit();
</script>
</body>
</html>
