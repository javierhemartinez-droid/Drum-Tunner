<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Drum Tuner Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e; --surface: #161616; --border: #2a2a2a;
    --accent: #e8c84a; --text: #f0ede8; --muted: #666;
    --green: #4ae8a0; --blue: #4ab8e8; --red: #e84a5f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace; min-height: 100vh;
    padding: 10px;
  }
  header { padding: 15px 5px; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: var(--accent); }
  
  /* Botones grandes para móviles */
  .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 15px 10px; border-radius: 8px;
    font-size: 0.8rem; text-transform: uppercase; cursor: pointer;
  }
  .btn.active { background: var(--accent); color: #000; font-weight: bold; border-color: var(--accent); }
  
  .tuner-card {
    background: var(--surface); border: 1px solid var(--border);
    padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px;
  }
  .mic-btn {
    width: 100%; padding: 18px; font-size: 1rem; font-weight: bold;
    background: var(--surface); color: var(--accent); border: 2px solid var(--accent);
    border-radius: 50px; margin-bottom: 20px;
  }
  .mic-btn.on { background: var(--red); color: white; border-color: var(--red); }
  
  .note-display { font-family: 'Bebas Neue', sans-serif; font-size: 5rem; line-height: 1; margin: 10px 0; }
  .freq-display { color: var(--muted); font-size: 1rem; margin-bottom: 15px; }
  
  /* Medidor táctil */
  .meter-container { height: 10px; background: #222; border-radius: 5px; position: relative; margin: 25px 0; }
  .needle {
    position: absolute; width: 4px; height: 30px; background: var(--text);
    top: -10px; left: 50%; transform: translateX(-50%); transition: left 0.1s;
  }
  .center-mark { position: absolute; left: 50%; height: 100%; width: 2px; background: var(--muted); }

  .status-text { font-size: 0.8rem; letter-spacing: 1px; height: 20px; text-transform: uppercase; }
</style>
</head>
<body>

<header>
  <h1>Drum Tuner</h1>
  <p style="font-size: 0.6rem; color: var(--muted);">OPTIMIZADO PARA MÓVIL</p>
</header>

<button class="mic-btn" id="micBtn">▶ ACTIVAR MICRÓFONO</button>

<div class="section-label" style="font-size:0.7rem; color:var(--muted); margin-bottom:10px;">PRESETS</div>
<div class="preset-grid" id="presetGrid">
  <button class="btn active" onclick="setTarget('D', 2, 'BOMBO')">BOMBO (D2)</button>
  <button class="btn" onclick="setTarget('A', 3, 'REDO')">REDO (A3)</button>
  <button class="btn" onclick="setTarget('D', 4, 'TOM 1')">TOM 1 (D4)</button>
  <button class="btn" onclick="setTarget('A', 3, 'TOM 2')">TOM 2 (A3)</button>
</div>

<div class="tuner-card">
  <div id="targetLabel" style="font-size: 0.7rem; color: var(--accent);">OBJETIVO: BOMBO (D2)</div>
  <div class="note-display" id="noteOut">—</div>
  <div class="freq-display" id="freqOut">0.0 Hz</div>
  
  <div class="meter-container">
    <div class="center-mark"></div>
    <div class="needle" id="needle"></div>
  </div>
  <div class="status-text" id="statusOut">ESPERANDO SEÑAL...</div>
</div>

<script>
let audioCtx, analyser, micStream;
let targetFreq = 73.42; // D2 por defecto

const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function setTarget(note, oct, name) {
  const idx = NOTES.indexOf(note);
  targetFreq = 440 * Math.pow(2, ((oct - 4) * 12 + idx - 9) / 12);
  document.getElementById('targetLabel').innerText = `OBJETIVO: ${name} (${note}${oct})`;
  
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

document.getElementById('micBtn').addEventListener('click', async () => {
  if (audioCtx) {
    location.reload(); // Forma más limpia de resetear en móvil
    return;
  }

  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    source.connect(analyser);
    
    document.getElementById('micBtn').innerText = "■ DETENER";
    document.getElementById('micBtn').classList.add('on');
    update();
  } catch (err) {
    alert("Error de micrófono: " + err);
  }
});

function update() {
  const buffer = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buffer);
  const freq = getPitch(buffer, audioCtx.sampleRate);

  if (freq > 0) {
    const cents = 1200 * Math.log2(freq / targetFreq);
    document.getElementById('freqOut').innerText = freq.toFixed(1) + " Hz";
    
    // Calcular nota más cercana
    const semitones = 12 * Math.log2(freq / 440);
    const noteIdx = (Math.round(semitones) % 12 + 12 + 9) % 12;
    document.getElementById('noteOut').innerText = NOTES[noteIdx];

    // Mover aguja
    const pos = Math.max(0, Math.min(100, 50 + (cents / 2)));
    document.getElementById('needle').style.left = pos + "%";
    
    const status = document.getElementById('statusOut');
    if (Math.abs(cents) < 5) {
      status.innerText = "✓ AFINADO"; status.style.color = "#4ae8a0";
    } else {
      status.innerText = cents > 0 ? "▲ DEMASIADO ALTO" : "▼ DEMASIADO BAJO";
      status.style.color = cents > 0 ? "#e07a3a" : "#4ab8e8";
    }
  }
  requestAnimationFrame(update);
}

function getPitch(buf, sr) {
  let minPos = 0, maxPos = 0, maxVal = -1;
  for (let i = 0; i < buf.length / 2; i++) {
    let sum = 0;
    for (let j = 0; j < buf.length / 2; j++) sum += buf[j] * buf[j + i];
    if (sum > maxVal) { maxVal = sum; maxPos = i; }
  }
  return sr / maxPos;
}
</script>
</body>
</html>
